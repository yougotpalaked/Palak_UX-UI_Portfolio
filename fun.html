  <style>
    .fun-page {
      max-width: 1100px; margin: 0 auto;
      padding: calc(var(--nav) + 48px) 24px 60px;
    }

    .fun-header {
      margin-bottom: 48px;
    }

    .fun-header h1 {
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 700;
      color: #111;
      line-height: 1.1;
    }

    .fun-header p {
      margin-top: 10px;
      font-size: 15px;
      color: #888;
      line-height: 1.6;
      white-space: nowrap;
    }

    .fun-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .fun-card {
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      display: block;
      transition: transform .25s;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      aspect-ratio: 16 / 9;
      background: #1a1a1a;
    }

    .fun-card:hover { transform: translateY(-4px); }

    .fun-card-thumb {
      position: absolute; inset: 0;
      overflow: hidden;
    }

    .fun-card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: filter .3s ease, transform .3s ease;
    }

    .fun-card:hover .fun-card-thumb img {
      filter: blur(6px) brightness(0.6);
      transform: scale(1.03);
    }

    .fun-card-placeholder {
      width: 100%; height: 100%;
      background: #1a1a1a;
    }

    .fun-card-badge {
      position: absolute;
      top: 14px; left: 14px;
      background: rgba(110,231,160,0.18);
      border: 1px solid rgba(110,231,160,0.35);
      color: #6ee7a0;
      font-size: 10px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 999px;
    }

    .fun-card-body {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 48px 22px 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .3s ease, transform .3s ease;
    }

    .fun-card:hover .fun-card-body {
      opacity: 1; transform: translateY(0);
    }

    .fun-card-name {
      font-size: 18px; font-weight: 700;
      color: #f0f0f0; line-height: 1.2;
    }

    .fun-card-coming {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500;
      color: #333; letter-spacing: .08em; text-transform: uppercase;
    }
  </style>
